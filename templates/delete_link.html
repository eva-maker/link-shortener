{% extends 'base.html' %}

{% block content %}
<div class="form-page">
    <h1>Delete Link</h1>

    <p>Are you sure you want to delete <strong>/s/{{ link.short_code }}</strong>?</p>
    <p class="small">{{ link.original_url }}</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-main btn-logout">Yes, delete</button>
    </form>

    <p class="small">
        <a href="{% url 'links' %}">← Cancel</a>
    </p>
</div>
{% endblock %}
